name: Setup monorepo
description: Install Node, pnpm, cache dependencies, and install workspace packages
inputs:
  node-version:
    description: Node.js version
    required: false
    default: "25"
  enable-turbo-cache:
    description: Restore and save Turbo task cache
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        packageManagerField: true

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Get pnpm store directory
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

    - uses: actions/cache@v4
      with:
        path: ${{ env.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - uses: actions/cache@v4
      if: inputs.enable-turbo-cache == 'true'
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ hashFiles('apps/**/*.ts', 'apps/**/*.tsx', 'packages/**/*.ts', 'packages/**/*.tsx') }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
          ${{ runner.os }}-turbo-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
